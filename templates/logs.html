<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Event Logs</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="container">

    <header>

        <h1>Event Log History</h1>

        <p>All detected surveillance events</p>

    </header>

    <table>

        <thead>

            <tr>

                <th>Timestamp</th>
                <th>Person</th>
                <th>Status</th>

            </tr>

        </thead>

        <tbody>

            {% for row in logs %}

            <tr>

                <td>{{ row[0] }}</td>
                <td>{{ row[1] }}</td>
                <td>{{ row[2] }}</td>

            </tr>

            {% endfor %}

        </tbody>

    </table>

    <br>

    <button onclick="window.location='/'">
        ← Dashboard
    </button>

</div>

</body>

</html>
